<body>
<header class="site-header">
  <div class="header-inner">
    <h1>桃園市老人福利機構一覽表</h1>
    <div class="meta"><a href="../index.html" style="color:#fff">← 回首頁</a></div>
  </div>

    </nav>
    <div class="meta" id="meta-updated"></div>
  </div>
</header>
<noscript>
  <p style="max-width:1280px;margin:16px auto;padding:0 24px;color:#b91c1c;">
    本頁需要啟用 JavaScript 才能載入資料與圖表，請於瀏覽器設定中開啟 JavaScript 後重新整理頁面。
  </p>
</noscript>
<main>
  <div class="stat-grid">
    <div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">篩選後機構數</div></div>
    <div class="stat-card"><div class="num" id="stat-districts">-</div><div class="label">涵蓋鄉鎮市區數</div></div>
    <div class="stat-card"><div class="num" id="stat-beds">-</div><div class="label">篩選後床位總數</div></div>
    <div class="stat-card"><div class="num" id="stat-top">-</div><div class="label">機構數最多鄉鎮</div></div>
  </div>

  <div class="card">
    <div class="filters">
      <div class="field">
        <label>鄉鎮市區</label>
        <select id="f-district"><option value="">全部</option></select>
      </div>
      <div class="field">
        <label>收容對象</label>
        <select id="f-occupant"><option value="">全部</option></select>
      </div>
      <div class="field">
        <label>最近1次評鑑成績</label>
        <select id="f-rating"><option value="">全部</option></select>
      </div>
      <div class="field" style="flex:1;">
        <label>關鍵字（機構名稱 / 負責人 / 地址）</label>
        <input type="text" id="f-keyword" placeholder="例如：長照、養護、路名…" />
      </div>
      <button class="ghost" id="f-reset">重設篩選</button>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="chart-box" style="height:340px;"><h3>各鄉鎮市區機構數</h3><canvas id="chart-district"></canvas></div>
    </div>
    <div class="card">
      <div class="chart-box" style="height:340px;"><h3>最近1次評鑑成績分布</h3><canvas id="chart-rating"></canvas></div>
    </div>
    <div class="card">
      <div class="chart-box" style="height:260px;"><h3>收容對象類型分布</h3><canvas id="chart-occupant"></canvas></div>
    </div>
    <div class="card">
      <div class="chart-box" style="height:260px;"><h3>立案床數規模分布</h3><canvas id="chart-beds"></canvas></div>
    </div>
  </div>

  <h2 class="section-title">資料明細</h2>
  <div class="card">
    <div id="table-container"></div>
  </div>
</main>

  地址欄位比對桃園市13區清單解析產生，僅供參考。
</footer>
