<main>
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">篩選後機構數</div></div>
    <div class="stat-card"><div class="num" id="stat-districts">-</div><div class="label">涵蓋行政區數</div></div>
    <div class="stat-card"><div class="num" id="stat-capacity">-</div><div class="label">核定收容人數總和</div></div>
    <div class="stat-card"><div class="num" id="stat-top">-</div><div class="label">機構最多行政區</div></div>
  </div>

  <div class="card">
    <div class="filters">
      <div class="field">
        <label>行政區</label>
        <select id="f-district"><option value="">全部</option></select>
      </div>
      <div class="field">
        <label>收容對象</label>
        <select id="f-target"><option value="">全部</option></select>
      </div>
      <div class="field" style="flex:1;">
        <label>關鍵字（機構名稱 / 負責人 / 地址）</label>
        <input type="text" id="f-keyword" placeholder="例如：機構名稱、負責人姓名…" />
      </div>
      <button class="ghost" id="f-reset">重設篩選</button>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div id="map"></div>
    </div>
    <div class="card">
      <div class="chart-box"><h3>各行政區機構數</h3><div class="chart-canvas-wrap"><canvas id="chart-district"></canvas></div></div>
      <div class="chart-box"><h3>機構屬性分布</h3><div class="chart-canvas-wrap"><canvas id="chart-attr"></canvas></div></div>
    </div>
  </div>

  <h2 class="section-title">資料明細</h2>
  <div class="card">
    <div id="table-container"></div>
  </div>
</main>
