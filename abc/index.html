<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Dataset",
  "name": "長照ABC據點",
  "description": "長照2.0 A、B、C據點(含GIS座標XY)，涵蓋全國約3.1萬筆長照服務據點資訊。",
  "url": "https://www.sunkuo.cc/gov-open-data-dashboard/abc/index.html",
  "license": "https://data.gov.tw/license",
  "isAccessibleForFree": true,
  "inLanguage": "zh-Hant-TW",
  "keywords": ["長照", "長照2.0", "長照ABC據點", "老年安養"],
  "spatialCoverage": {
    "@type": "Place",
    "name": "台灣"
  },
  "creator": {
    "@type": "Organization",
    "name": "衛生福利部",
    "url": "https://www.mohw.gov.tw/"
  },
  "distribution": {
    "@type": "DataDownload",
    "encodingFormat": "CSV",
    "contentUrl": "https://ltcpap.mohw.gov.tw/publish/abc.csv"
  }
}

<body>
<header class="site-header">
  <div class="header-inner">
    <h1>長照ABC據點地圖儀表板</h1>
    <div class="meta"><a href="../index.html" style="color:#fff">← 回首頁</a></div>
  </div>
  <div class="header-inner">
    <nav>
      提供機關：衛生福利部　|　更新頻率：每1月　|　
      <a href="https://ltcpap.mohw.gov.tw/publish/abc.csv" target="_blank" rel="noopener">原始資料下載</a>
    </nav>
    <div class="meta" id="meta-updated"></div>
  </div>
</header>
<noscript>
  <p style="max-width:1280px;margin:16px auto;padding:0 24px;color:#b91c1c;">
    本頁需要啟用 JavaScript 才能載入地圖、資料與圖表，請於瀏覽器設定中開啟 JavaScript 後重新整理頁面。
  </p>
</noscript>
<main>
  <div class="stat-grid" id="stat-grid">
    <div class="stat-card"><div class="num" id="stat-total">-</div><div class="label">篩選後據點數</div></div>
    <div class="stat-card a"><div class="num" id="stat-a">-</div><div class="label">A級 旗艦店</div></div>
    <div class="stat-card b"><div class="num" id="stat-b">-</div><div class="label">B級 複合型中心</div></div>
    <div class="stat-card c"><div class="num" id="stat-c">-</div><div class="label">C級 巷弄長照站</div></div>
    <div class="stat-card"><div class="num" id="stat-beds">-</div><div class="label">開放床數合計</div></div>
    <div class="stat-card"><div class="num" id="stat-residents">-</div><div class="label">現有住民合計</div></div>
  </div>

  <div class="card">
    <div class="filters">
      <div class="field">
        <label>縣市</label>
        <select id="f-county"><option value="">全部</option></select>
      </div>
      <div class="field">
        <label>鄉鎮市區</label>
        <select id="f-district"><option value="">全部</option></select>
      </div>
      <div class="field">
        <label>類別</label>
        <div class="checkbox-group" id="f-category">
          <label><input type="checkbox" value="A" checked /> <span class="badge a">A</span></label>
          <label><input type="checkbox" value="B" checked /> <span class="badge b">B</span></label>
          <label><input type="checkbox" value="C" checked /> <span class="badge c">C</span></label>
        </div>
      </div>
      <div class="field" style="flex:1;">
        <label>關鍵字（機構名稱 / 地址 / 服務項目）</label>
        <input type="text" id="f-keyword" placeholder="例如：日間照顧、喘息服務、機構名稱…" />
      </div>
      <button class="ghost" id="f-reset">重設篩選</button>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div id="map"></div>
    </div>
    <div class="card">
      <div class="chart-box"><h3>各縣市據點數（前10）</h3><canvas id="chart-county"></canvas></div>
      <div class="chart-box"><h3>類別比例</h3><canvas id="chart-category"></canvas></div>
    </div>
  </div>

  <h2 class="section-title">資料明細</h2>
  <div class="card">
    <div id="table-container"></div>
  </div>
</main>
<footer class="site-footer">
  資料來源：<a href="https://ltcpap.mohw.gov.tw/publish/abc.csv" target="_blank" rel="noopener">衛生福利部 長照ABC據點</a>（原始資料 CSV）。
  依「政府資料開放授權條款-第1版」釋出。地址對應之縣市／鄉鎮市區由本站依原始地址欄位解析產生，僅供參考，實際請以原始資料為準。
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="../assets/table.js"></script>
<script src="app.js"></script>
</body>
</html>
